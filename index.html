<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث رسائل التليجرام المجمعة - MedQuiz</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #10b981; 
            --secondary: #38bdf8;
            --text: #f8fafc;
        }
        body {
            margin: 0; padding: 20px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: var(--card-bg);
            padding: 25px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%; max-width: 600px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        h2 { text-align: center; color: var(--primary); margin-top: 0; }
        p { text-align: center; color: #94a3b8; font-size: 0.9rem; line-height: 1.5; margin-bottom: 20px; }
        
        /* الصندوق الذكي اللي بيحافظ على التنسيق والاقتباسات */
        .editor-box {
            width: 100%; min-height: 250px; max-height: 400px; overflow-y: auto;
            background: #0b1120; border: 2px solid #334155; border-radius: 12px;
            padding: 15px; color: #fff; font-size: 1rem; line-height: 1.6;
            outline: none; transition: 0.3s; box-sizing: border-box;
        }
        .editor-box:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }
        .editor-box a { color: var(--secondary); text-decoration: underline; }
        
        /* ستايل مخصص للحفاظ على شكل الاقتباسات (Quotes) داخل الأداة */
        .editor-box blockquote {
            border-right: 4px solid var(--primary);
            padding-right: 12px;
            margin: 10px 0;
            color: #cbd5e1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px 0 0 4px;
        }
        .editor-box pre, .editor-box code {
            background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; font-family: monospace;
        }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        button {
            flex: 1; min-width: 150px; padding: 15px; border: none; border-radius: 12px;
            font-size: 1.05rem; font-weight: bold; cursor: pointer; transition: 0.3s; color: white;
        }
        .btn-process { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-process:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4); }
        
        .btn-copy { background: linear-gradient(135deg, #38bdf8, #2563eb); }
        .btn-copy:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(56, 189, 248, 0.4); }

        .status { text-align: center; margin-top: 15px; font-weight: bold; font-size: 0.95rem; min-height: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>♻️ مصنع رسائل التليجرام</h2>
        <p>انسخ الرسالة الكاملة من التليجرام والصقها هنا لتغيير الروابط مع الحفاظ التام على الاقتباسات والتنسيق.</p>
        
        <div id="rich-editor" class="editor-box" contenteditable="true"></div>
        
        <div class="btn-group">
            <button class="btn-process" onclick="processLinks()">1. استبدال الروابط 🔄</button>
            <button class="btn-copy" onclick="copyRichText()">2. نسخ الرسالة 📋</button>
        </div>

        <div id="status-msg" class="status"></div>
    </div>

    <script>
        function processLinks() {
            const editor = document.getElementById('rich-editor');
            const status = document.getElementById('status-msg');
            
            if (editor.innerText.trim() === '') {
                status.style.color = '#ef4444';
                status.innerText = '⚠️ المربع فارغ، يرجى لصق الرسالة أولاً!';
                return;
            }

            // الطريقة الجراحية الجديدة: البحث عن الروابط (a tags) وتعديلها فقط دون المساس بالـ HTML
            const links = editor.querySelectorAll('a');
            let matchCount = 0;

            links.forEach(link => {
                const currentHref = link.getAttribute('href');
                
                // فحص إذا كان الرابط يخص Netlify
                if (currentHref && currentHref.includes('netlify.app')) {
                    try {
                        const urlObj = new URL(currentHref);
                        const queryString = urlObj.search; // يسحب الـ ID
                        const hashString = urlObj.hash;    // لو في Hash
                        
                        // تركيب الرابط الجديد وتحديثه في الكواليس
                        const newBaseUrl = "https://m-site.github.io/rafik-altib/";
                        link.setAttribute('href', newBaseUrl + queryString + hashString);
                        
                        matchCount++;
                    } catch (e) {
                        console.error('رابط غير صالح:', currentHref);
                    }
                }
            });

            if (matchCount > 0) {
                status.style.color = '#10b981';
                status.innerText = `✅ روعة! تم اصطياد وتحديث (${matchCount}) رابط مع الحفاظ التام على الاقتباسات!`;
            } else {
                status.style.color = '#f59e0b';
                status.innerText = '⚠️ لم يتم العثور على أي روابط Netlify قديمة.';
            }
        }

        function copyRichText() {
            const editor = document.getElementById('rich-editor');
            const status = document.getElementById('status-msg');

            const selection = window.getSelection();
            const range = document.createRange();
            range.selectNodeContents(editor);
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                status.style.color = '#38bdf8';
                status.innerText = '📋 تم النسخ بنجاح! روح للتليجرام واعمل (تعديل > لصق).';
            } catch (err) {
                status.style.color = '#ef4444';
                status.innerText = '❌ فشل النسخ التلقائي، يرجى تظليل النص ونسخه يدوياً.';
            }
            
            selection.removeAllRanges();
        }
    </script>

</body>
</html>
